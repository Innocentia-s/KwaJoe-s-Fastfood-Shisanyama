<!DOCTYPE html>
<html>
<head>
    <title>Add Items</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>

<div class="overlay">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>🔥 Shisa Admin</h2>
        <a href="dashboard.html">Dashboard</a>
        <a href="menu.html">Manage Menu</a>
        <a href="add-items.html">Add Items</a>
        <a href="orders.html">Orders</a>
        <a href="users.html">Users</a>
        <a href="logout.html">Logout</a>
    </div>

    <!-- MAIN -->
    <div class="main">

        <div class="topbar">
            <h1>Add Food Items</h1>
        </div>

        <!-- INPUT FORM -->
        <div class="card">
            <h3>New Item</h3>

            <input type="text" id="foodName" placeholder="Food Name">
            <input type="number" id="foodPrice" placeholder="Price">

            <button onclick="addItem()">Add Item</button>
        </div>

        <!-- TABLE -->
        <table>
            <thead>
                <tr>
                    <th>Food Name</th>
                    <th>Price</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="itemTable">
                <!-- Items appear here -->
            </tbody>
        </table>

    </div>

</div>

<!-- JAVASCRIPT (WORKING BUTTONS) -->
<script>
    function addItem() {
        let name = document.getElementById("foodName").value;
        let price = document.getElementById("foodPrice").value;

        if (name === "" || price === "") {
            alert("Please fill in all fields");
            return;
        }

        let table = document.getElementById("itemTable");

        let row = table.insertRow();

        row.innerHTML = `
            <td>${name}</td>
            <td>R${price}</td>
            <td><button onclick="deleteItem(this)">Delete</button></td>
        `;

        document.getElementById("foodName").value = "";
        document.getElementById("foodPrice").value = "";
    }

    function deleteItem(button) {
        let row = button.parentElement.parentElement;
        row.remove();
    }
</script>

</body>
</html>
