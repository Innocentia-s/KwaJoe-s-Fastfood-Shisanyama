<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="overlay">

    <div class="main" style="display:flex; justify-content:center; align-items:center; height:100vh;">

        <form action="dashboard.html" method="GET" class="card" style="width:320px; text-align:center;">

            <!-- ADMIN IMAGE -->
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
                 alt="Admin"
                 style="width:90px; height:90px; border-radius:50%; margin-bottom:10px;">

            <h2>Admin Login</h2>

            <input type="text" placeholder="Username" required 
                style="width:90%; padding:10px; margin:10px;"><br>

            <input type="password" placeholder="Password" required 
                style="width:90%; padding:10px; margin:10px;"><br>

            <button type="submit" class="btn btn-add" style="width:95%;">
                Login
            </button>

        </form>

    </div>

</div>

</body>
</html>
